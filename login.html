<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login | Rajesh Builders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">R</div>
      <h1 class="login-title">Admin Portal</h1>
      <p class="login-subtitle">Rajesh Builders and Developers</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-username">Username</label>
        <input type="text" id="login-username" class="form-control" placeholder="Enter username" autocomplete="username">
        <div class="form-error" id="username-error"></div>
      </div>
      <div class="form-group" style="margin-bottom:32px">
        <label class="form-label" for="login-password">Password</label>
        <div style="position:relative">
          <input type="password" id="login-password" class="form-control" placeholder="Enter password" autocomplete="current-password">
          <button type="button" id="toggle-password" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--light-gray);cursor:pointer;font-size:1rem">👁</button>
        </div>
        <div class="form-error" id="password-error"></div>
      </div>

      <div id="login-error" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:20px;display:none">
        ❌ Invalid username or password. Please try again.
      </div>

      <button type="submit" class="btn-primary" style="width:100%;justify-content:center" id="login-btn">
        Sign In →
      </button>
    </form>

    <div style="text-align:center;margin-top:24px">
      <a href="index.html" style="font-size:0.82rem;color:var(--light-gray)">← Back to Website</a>
    </div>
  </div>
</div>

<script type="module">
  import { login, isLoggedIn } from './js/auth.js';

  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'admin.html';

  const form = document.getElementById('login-form');
  const errEl = document.getElementById('login-error');

  document.getElementById('toggle-password')?.addEventListener('click', () => {
    const pwd = document.getElementById('login-password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errEl.style.display = 'none';
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    if (!username || !password) {
      errEl.textContent = '❌ Please enter both username and password.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing In...';
    btn.disabled = true;

    setTimeout(() => {
      if (login(username, password)) {
        window.location.href = 'admin.html';
      } else {
        errEl.style.display = 'block';
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    }, 800);
  });
</script>
</body>
</html>
